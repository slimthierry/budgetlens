version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: budgetlens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: budgetlens
      POSTGRES_USER: budgetlens
      POSTGRES_PASSWORD: budgetlens_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetlens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: budgetlens-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budgetlens-backend
    restart: unless-stopped
    ports:
      - "74000:74000"
    environment:
      DATABASE_URL: postgresql+asyncpg://budgetlens:budgetlens_secret@postgres:5432/budgetlens
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: budgetlens-dev-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:3500"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  redis_data:
